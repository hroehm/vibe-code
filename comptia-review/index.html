<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA AI Tutor</title>
<style>
body { font-family: Arial; background:#f4f6f8; margin:0;}
.container { max-width:800px; margin:auto; padding:20px;}
.card { background:white; padding:20px; border-radius:10px; margin-top:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h1 { text-align:center;}
select,input,button { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc;}
button { background:#0078d4; color:white; cursor:pointer;}
.option { padding:10px; margin:5px 0; border-radius:6px; background:#eef2f7; cursor:pointer;}
.option:hover { background:#dbe7f3;}
.feedback { margin-top:15px; font-weight:bold;}
</style>
</head>
<body>
<div class="container">
<h1>CompTIA AI Tutor</h1>

<div class="card" id="setup">
<label>Exam:</label>
<select id="exam">
<option>A+</option>
<option>Network+</option>
<option>Security+</option>
</select>

<label>Objective:</label>
<select id="objective">
<option>Hardware</option>
<option>Networking</option>
<option>Security</option>
<option>Troubleshooting</option>
</select>

<label>Difficulty:</label>
<select id="difficulty">
<option>easy</option>
<option>medium</option>
<option>hard</option>
</select>

<label>Number of Questions:</label>
<input type="number" id="num" value="5" min="1" max="20">

<button onclick="startQuiz()">Start</button>
</div>

<div class="card" id="quiz" style="display:none;">
<div id="question"></div>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<button id="nextBtn" style="display:none;" onclick="nextQuestion()">Next</button>
</div>

<div class="card" id="result" style="display:none;"></div>
</div>

<script>
// Question bank with multiple variations
const questionBank = {
Hardware: [
    () => makeQ(
        "A technician installs a new storage device. Which interface provides the fastest performance?",
        ["SATA II","SATA III","NVMe PCIe","IDE"],
        2,
        "NVMe uses PCIe lanes for much faster speeds than SATA.",
        "NVMe drives outperform SATA-based drives due to direct PCIe communication."
    ),
    () => makeQ(
        "Which component is MOST likely to affect system performance when multitasking?",
        ["CPU","RAM","Power supply","Case fan"],
        1,
        "RAM impacts multitasking efficiency directly.",
        "More RAM allows more programs to run simultaneously without slowdown."
    ),
    () => makeQ(
        "A user reports slow boot times. Which upgrade is BEST?",
        ["Add HDD","Upgrade CPU","Install SSD","Add GPU"],
        2,
        "SSDs drastically reduce boot times.",
        "SSD storage greatly improves read/write speed compared to HDD."
    )
],

Networking: [
    () => makeQ(
        "A company wants to segment network traffic without new hardware. What should be used?",
        ["VPN","VLAN","DNS","NAT"],
        1,
        "VLANs logically separate networks.",
        "VLANs create isolated broadcast domains on the same switch."
    ),
    () => makeQ(
        "Which protocol is used to automatically assign IP addresses?",
        ["DNS","DHCP","FTP","SNMP"],
        1,
        "DHCP dynamically assigns IP addresses.",
        "DHCP simplifies network configuration by assigning IPs automatically."
    ),
    () => makeQ(
        "A technician needs to test connectivity. Which command should be used?",
        ["ipconfig","ping","tracert","netstat"],
        1,
        "Ping tests connectivity.",
        "Ping sends ICMP echo requests to verify reachability."
    )
],

Security: [
    () => makeQ(
        "A user clicks a fake email link. What attack occurred?",
        ["Malware","Phishing","DDoS","Brute force"],
        1,
        "Phishing tricks users into revealing info.",
        "Phishing is a social engineering method using fake communications."
    ),
    () => makeQ(
        "Which method protects data confidentiality?",
        ["Hashing","Encryption","Firewall","Proxy"],
        1,
        "Encryption secures data.",
        "Encryption converts data into unreadable format without keys."
    ),
    () => makeQ(
        "What device filters incoming network traffic?",
        ["Router","Firewall","Switch","Access point"],
        1,
        "Firewalls filter traffic.",
        "Firewalls control incoming/outgoing traffic based on rules."
    )
],

Troubleshooting: [
    () => makeQ(
        "What is the FIRST step in troubleshooting?",
        ["Test theory","Identify problem","Fix issue","Document"],
        1,
        "Always identify the issue first.",
        "CompTIA methodology starts with identifying problem symptoms."
    ),
    () => makeQ(
        "A solution has been applied. What is the NEXT step?",
        ["Document","Verify functionality","Establish theory","Escalate"],
        1,
        "Verify the fix worked.",
        "Always confirm the solution resolves the issue."
    ),
    () => makeQ(
        "A problem cannot be solved. What should be done?",
        ["Ignore it","Escalate","Reboot","Replace all parts"],
        1,
        "Escalation is appropriate when needed.",
        "Unresolved issues should be escalated to higher support."
    )
]
};

// Helper
function makeQ(q, options, answer, explanation, tutorial){
    return {q, options, answer, explanation, tutorial};
}

// Shuffle
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

// Generate unique questions
function generateQuestions(obj, num, difficulty){
    let pool = questionBank[obj].map(fn=>fn());

    // Add difficulty flavor
    pool = pool.map(q => {
        if(difficulty==="medium")
            q.q = "Scenario: " + q.q;
        if(difficulty==="hard")
            q.q = "In a corporate environment: " + q.q + " What is the BEST answer?";
        return q;
    });

    // Shuffle and return unique set
    return shuffle(pool).slice(0, num);
}

// State
let questions=[], current=0, correctCount=0;

// Start
function startQuiz(){
    let obj = document.getElementById("objective").value;
    let num = parseInt(document.getElementById("num").value);
    let difficulty = document.getElementById("difficulty").value;

    questions = generateQuestions(obj, num, difficulty);

    current=0;
    correctCount=0;

    document.getElementById("setup").style.display="none";
    document.getElementById("quiz").style.display="block";

    showQuestion();
}

// Show
function showQuestion(){
    if(current>=questions.length){ showResult(); return; }

    let q=questions[current];
    document.getElementById("question").innerHTML=`<h3>Question ${current+1}</h3>${q.q}`;

    let optDiv=document.getElementById("options");
    optDiv.innerHTML="";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("nextBtn").style.display="none";

    q.options.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>checkAnswer(i);
        optDiv.appendChild(div);
    });
}

// Answer
function checkAnswer(i){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(i===q.answer){
        correctCount++;
        fb.innerHTML="✅ Correct!";
        document.getElementById("nextBtn").style.display="block";
    } else {
        fb.innerHTML=`❌ Incorrect.<br>${q.explanation}
        <br><button onclick="showTutorial()">Show Tutorial</button>
        <button onclick="nextQuestion()">Skip</button>`;
    }
}

// Tutorial
function showTutorial(){
    let q=questions[current];
    document.getElementById("feedback").innerHTML+=`<p><em>${q.tutorial}</em></p>
    <button onclick="nextQuestion()">Continue</button>`;
}

// Next
function nextQuestion(){
    current++;
    showQuestion();
}

// Result
function showResult(){
    let percent=Math.round((correctCount/questions.length)*100);
    document.getElementById("quiz").style.display="none";
    let r=document.getElementById("result");
    r.style.display="block";
    r.innerHTML=`<h2>Finished!</h2><p>Score: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>`;
}
</script>
</body>
</html>
