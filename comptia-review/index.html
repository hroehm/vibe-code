<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA AI Tutor</title>
<style>
body { font-family: Arial; background:#f4f6f8; margin:0;}
.container { max-width:800px; margin:auto; padding:20px;}
.card { background:white; padding:20px; border-radius:10px; margin-top:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h1 { text-align:center;}
select,input,button { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc;}
button { background:#0078d4; color:white; cursor:pointer;}
.option { padding:10px; margin:5px 0; border-radius:6px; background:#eef2f7; cursor:pointer;}
.option:hover { background:#dbe7f3;}
.feedback { margin-top:15px; font-weight:bold;}
.question { font-size:1.1em; margin-bottom:10px;}
</style>
</head>
<body>
<div class="container">
<h1>CompTIA AI Tutor</h1>

<div class="card" id="setup">
<label>Exam:</label>
<select id="exam">
<option>A+</option>
<option>Network+</option>
<option>Security+</option>
</select>

<label>Objective:</label>
<select id="objective">
<option>Hardware</option>
<option>Networking</option>
<option>Security</option>
<option>Troubleshooting</option>
</select>

<label>Difficulty:</label>
<select id="difficulty">
<option>easy</option>
<option>medium</option>
<option>hard</option>
</select>

<label>Number of Questions:</label>
<input type="number" id="num" value="5" min="1" max="20">

<button onclick="startQuiz()">Start</button>
</div>

<div class="card" id="quiz" style="display:none;">
<div id="question" class="question"></div>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<button id="nextBtn" style="display:none;" onclick="nextQuestion()">Next</button>
</div>

<div class="card" id="result" style="display:none;"></div>
</div>

<script>
// More realistic CompTIA-style question generator
function generateQuestion(exam, obj, difficulty) {

    const scenarios = {
        Hardware: [
            {
                q: "A technician is installing a new SSD in a workstation. Which interface provides the FASTEST data transfer speeds?",
                options: ["SATA II", "SATA III", "NVMe over PCIe", "IDE"],
                answer: 2,
                explanation: "NVMe over PCIe offers significantly faster transfer speeds than SATA or IDE.",
                tutorial: "NVMe uses PCIe lanes and is much faster than traditional SATA-based drives."
            }
        ],
        Networking: [
            {
                q: "A network administrator needs to segment traffic between departments while maintaining a single physical switch. What should be implemented?",
                options: ["VPN", "VLAN", "NAT", "DNS"],
                answer: 1,
                explanation: "VLANs logically segment networks on the same physical hardware.",
                tutorial: "VLANs allow separation of broadcast domains without additional physical devices."
            }
        ],
        Security: [
            {
                q: "A user receives an email asking them to verify their account by clicking a link. This is an example of:",
                options: ["Malware", "Phishing", "DDoS", "Encryption"],
                answer: 1,
                explanation: "Phishing attempts trick users into revealing sensitive information.",
                tutorial: "Phishing is a social engineering attack often delivered via email."
            }
        ],
        Troubleshooting: [
            {
                q: "A computer intermittently loses network connectivity. What is the FIRST step in troubleshooting?",
                options: [
                    "Replace the network card",
                    "Identify the problem",
                    "Escalate the issue",
                    "Implement a fix"
                ],
                answer: 1,
                explanation: "The first step is always to identify and verify the problem.",
                tutorial: "CompTIA troubleshooting methodology starts with identifying symptoms."
            }
        ]
    };

    // Difficulty adjustment
    let base = scenarios[obj][0];
    let question = { ...base };

    if (difficulty === "medium") {
        question.q = "A technician is troubleshooting in a real-world scenario: " + base.q;
    }

    if (difficulty === "hard") {
        question.q = "A company environment presents this issue: " + base.q + " What is the BEST solution?";
    }

    return question;
}

// State
let questions=[], current=0, correctCount=0;

// Start quiz
function startQuiz(){
    const exam = document.getElementById("exam").value;
    const obj = document.getElementById("objective").value;
    const difficulty = document.getElementById("difficulty").value;
    const num = parseInt(document.getElementById("num").value);

    questions=[];
    for(let i=0;i<num;i++){
        questions.push(generateQuestion(exam,obj,difficulty));
    }

    current=0;
    correctCount=0;
    saveProgress();

    document.getElementById("setup").style.display="none";
    document.getElementById("quiz").style.display="block";

    showQuestion();
}

// Show question
function showQuestion(){
    if(current>=questions.length){ showResult(); return; }

    let q=questions[current];
    document.getElementById("question").innerHTML=`<strong>Question ${current+1}:</strong> ${q.q}`;

    let optDiv=document.getElementById("options");
    optDiv.innerHTML="";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("nextBtn").style.display="none";

    q.options.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>checkAnswer(i);
        optDiv.appendChild(div);
    });
}

// Check answer
function checkAnswer(i){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(i===q.answer){
        correctCount++;
        fb.innerHTML="✅ Correct! Nice work—this aligns with CompTIA style reasoning.";
        document.getElementById("nextBtn").style.display="block";
    } else {
        fb.innerHTML=`❌ Incorrect.<br>${q.explanation}
        <br><button onclick="showTutorial()">Show Tutorial</button>
        <button onclick="nextQuestion()">Skip</button>`;
    }
    saveProgress();
}

// Tutorial
function showTutorial(){
    let q=questions[current];
    document.getElementById("feedback").innerHTML+=`<p><em>${q.tutorial}</em></p>
    <button onclick="nextQuestion()">Continue</button>`;
}

// Next
function nextQuestion(){
    current++;
    saveProgress();
    showQuestion();
}

// Result
function showResult(){
    let percent=Math.round((correctCount/questions.length)*100);
    document.getElementById("quiz").style.display="none";
    let r=document.getElementById("result");
    r.style.display="block";
    r.innerHTML=`<h2>Finished!</h2><p>Score: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>`;
    localStorage.removeItem("progress");
}

// Save progress
function saveProgress(){
    localStorage.setItem("progress",JSON.stringify({current,correctCount}));
}
</script>
</body>
</html>
