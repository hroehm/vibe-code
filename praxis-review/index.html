<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:white; padding:20px; margin:15px 0; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
button { padding:10px; margin:5px; background:#0078d4; color:white; border:none; border-radius:5px; cursor:pointer;}
button:hover { background:#005a9e; }
.correct { color:green; font-weight:bold; }
.incorrect { color:red; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">
<h3>Start Practice</h3>

<label>Praxis Test Number:</label><br>
<input type="text" id="testNumber" placeholder="e.g., 5733"><br><br>

<label>Category:</label><br>
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>

<label>Number of Questions:</label><br>
<input type="number" id="numQ" value="5" min="1" max="20"><br><br>

<button onclick="start()">Start</button>
</div>

<div class="card hidden" id="quiz">
<h3 id="progress"></h3>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<button id="nextBtn" class="hidden" onclick="next()">Next</button>
</div>

<div class="card hidden" id="results">
<h3>Results</h3>
<p id="score"></p>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;

// GENERATORS
function generateMathQ(testNum) {
    let a = Math.floor(Math.random()*20);
    let b = Math.floor(Math.random()*20);
    let answer = String(a + b);

    return {
        question: `Praxis ${testNum}: What is ${a} + ${b}?`,
        options: shuffle([
            answer,
            String(a+b+1),
            String(a+b-1),
            String(a+b+2)
        ]),
        answer: answer,
        rationale: `Add ${a} and ${b}. ${a} + ${b} = ${answer}.`
    };
}

function generateReadingQ(testNum) {
    const passages = [
        {
            text: "Effective teachers adjust instruction to meet student needs.",
            answer: "Teachers should adapt instruction"
        },
        {
            text: "Practicing reading improves comprehension skills.",
            answer: "Practice improves comprehension"
        }
    ];

    let p = passages[Math.floor(Math.random()*passages.length)];

    return {
        question: `Praxis ${testNum}: ${p.text} What is the main idea?`,
        options: shuffle([
            p.answer,
            "Teaching is difficult",
            "Reading is optional",
            "Students dislike learning"
        ]),
        answer: p.answer,
        rationale: "The main idea is the central message of the sentence."
    };
}

function generateWritingQ(testNum) {
    return {
        question: `Praxis ${testNum}: Which sentence is grammatically correct?`,
        options: shuffle([
            "She doesn't like apples.",
            "She don't like apples.",
            "She not like apples.",
            "She doesn't likes apples."
        ]),
        answer: "She doesn't like apples.",
        rationale: "Use 'doesn't' with the base form of the verb."
    };
}

// GENERATE SET
function generateQuestions(type, count, testNum) {
    let qs = [];
    for (let i = 0; i < count; i++) {
        if (type === "math") qs.push(generateMathQ(testNum));
        if (type === "reading") qs.push(generateReadingQ(testNum));
        if (type === "writing") qs.push(generateWritingQ(testNum));
    }
    return qs;
}

// SHUFFLE
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// START
function start() {
    const type = document.getElementById("category").value;
    const num = parseInt(document.getElementById("numQ").value);
    const testNum = document.getElementById("testNumber").value || "General";

    questions = generateQuestions(type, num, testNum);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

// SHOW
function show() {
    let q = questions[current];

    document.getElementById("progress").innerText =
        `Question ${current+1}/${questions.length}`;

    document.getElementById("question").innerText = q.question;

    let div = document.getElementById("answers");
    div.innerHTML = "";

    q.options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => check(String(opt));
        div.appendChild(btn);
    });

    document.getElementById("feedback").innerText = "";
    document.getElementById("nextBtn").classList.add("hidden");
}

// CHECK
function check(ans) {
    let q = questions[current];
    let fb = document.getElementById("feedback");

    if (String(ans) === String(q.answer)) {
        correct++;
        fb.className = "correct";
        fb.innerText = "✅ Correct!";
    } else {
        wrong++;
        fb.className = "incorrect";
        fb.innerHTML = `❌ Incorrect<br>
        Correct Answer: ${q.answer}<br>
        ${q.rationale}<br><br>`;

        let review = document.createElement("button");
        review.innerText = "Review Concept";
        review.onclick = () => alert("Review tip: Revisit the explanation and try another similar question.");
        fb.appendChild(review);
    }

    localStorage.setItem("praxisStats", JSON.stringify({correct, wrong}));
    document.getElementById("nextBtn").classList.remove("hidden");
}

// NEXT
function next() {
    current++;
    if (current < questions.length) {
        show();
    } else {
        end();
    }
}

// END
function end() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("score").innerText =
        `Correct: ${correct} | Incorrect: ${wrong}`;
}

</script>

</body>
</html>
``
