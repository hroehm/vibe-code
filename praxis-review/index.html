<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:12px;
    margin:8px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.correct { color:green; }
.incorrect { color:red; }

.hidden { display:none; }

/* TRUE FRACTION RENDERING */
.fraction {
    display: inline-grid;
    grid-template-rows: auto auto;
    justify-items: center;
    align-items: center;
    font-size: 22px;
    margin: 0 6px;
}

.fraction .top {
    border-bottom: 2px solid black;
    padding: 2px 10px;
}

.fraction .bottom {
    padding: 2px 10px;
}

/* Question formatting */
#question {
    font-size: 24px;
    margin: 20px 0;
}

/* Answer buttons */
#answers button {
    display:block;
    width:80%;
    margin:10px auto;
    font-size:20px;
}

/* Progress bar */
.bar-bg {
    width:100%;
    background:#ddd;
    border-radius:8px;
}
.bar-fill {
    height:15px;
    background:#0078d4;
    border-radius:8px;
    width:0%;
}
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">

<select id="mode" onchange="toggleMode()">
<option value="core">Core Praxis</option>
<option value="specific">Specific Test</option>
</select><br><br>

<div id="categoryDiv">
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>
</div>

<div id="testDiv" class="hidden">
<input id="testNumber" placeholder="Enter Praxis Test #"><br><br>
</div>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select><br><br>

<input type="number" id="numQ" value="5" min="1" max="20"><br><br>

<button onclick="start()">Start</button>

</div>

<div class="card hidden" id="quiz">

<h3 id="progress"></h3>

<div class="bar-bg">
<div id="bar" class="bar-fill"></div>
</div>

<p id="domain"></p>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="next()">Next</button>
</div>

<div class="card hidden" id="results">
<h3 id="score"></h3>

<h3>Domain Mastery</h3>
<div id="mastery"></div>

<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

let questions=[], current=0, correct=0, wrong=0;
let mastery = JSON.parse(localStorage.getItem("praxis_mastery")) || {};

// Toggle UI
function toggleMode(){
    let mode=document.getElementById("mode").value;
    document.getElementById("categoryDiv").classList.toggle("hidden", mode==="specific");
    document.getElementById("testDiv").classList.toggle("hidden", mode==="core");
}

// FRACTION
function frac(n,d){
    return `
    <span class="fraction">
        <span class="top">${n}</span>
        <span class="bottom">${d}</span>
    </span>`;
}

// MATH QUESTION
function mathQ(test,difficulty){

    let a = 1 + Math.floor(Math.random()*5);
    let b = 2 + Math.floor(Math.random()*6);

    let questionBlock = `
    <div>${frac(a,b)} + ${frac(1,b)}</div>
    <div style="margin-top:10px;">Find the sum</div>
    `;

    let correctAns = {n:a+1,d:b};

    return buildFracQ(test,"Fractions",questionBlock,correctAns,
    [
        correctAns,
        {n:a,d:b},
        {n:a+2,d:b},
        {n:b,d:a}
    ],
    "Add numerators when denominators are the same.");
}

// FRACTION BUILDER
function buildFracQ(test,domain,text,correct,options,rationale){
    let opts = options.map(o=>({
        display: frac(o.n,o.d),
        value: `${o.n}/${o.d}`
    }));

    return {
        domain,
        question:`Praxis ${test}: ${text}`,
        options: shuffle(opts),
        answer:`${correct.n}/${correct.d}`,
        rationale
    };
}

// READING
function readingQ(test){
    return {
        domain:"Inference",
        question:`Praxis ${test}: "Students who practice improve." What is implied?`,
        options: shuffle([
            {display:"Practice improves performance",value:"Practice improves performance"},
            {display:"Practice is harmful",value:"Practice is harmful"},
            {display:"Practice unnecessary",value:"Practice unnecessary"},
            {display:"Students fail often",value:"Students fail often"}
        ]),
        answer:"Practice improves performance",
        rationale:"Inference requires drawing a logical conclusion."
    };
}

// WRITING
function writingQ(test){
    return {
        domain:"Grammar",
        question:`Praxis ${test}: Which sentence is correct?`,
        options: shuffle([
            {display:"Each student has a book.",value:"Each student has a book."},
            {display:"Each students have books.",value:"bad"},
            {display:"Each student have book.",value:"bad2"},
            {display:"Students has books.",value:"bad3"}
        ]),
        answer:"Each student has a book.",
        rationale:"Singular subject requires singular verb."
    };
}

// GENERATE
function generate(type,count,test,difficulty){
    let arr=[];
    for(let i=0;i<count;i++){
        if(type==="math") arr.push(mathQ(test,difficulty));
        else if(type==="reading") arr.push(readingQ(test));
        else arr.push(writingQ(test));
    }
    return arr;
}

// START
function start(){
    let mode=document.getElementById("mode").value;
    let difficulty=document.getElementById("difficulty").value;
    let count=parseInt(document.getElementById("numQ").value);

    let test,type;

    if(mode==="core"){
        test="Core";
        type=document.getElementById("category").value;
    } else {
        test=document.getElementById("testNumber").value.trim();
        if(test===""){ alert("Enter test number"); return; }
        type="math";
    }

    current=0; correct=0; wrong=0;

    questions=generate(type,count,test,difficulty);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

// SHOW
function show(){
    let q=questions[current];

    document.getElementById("progress").innerText =
        `Question ${current+1}/${questions.length}`;

    document.getElementById("domain").innerText = "Domain: "+q.domain;
    document.getElementById("question").innerHTML = q.question;

    document.getElementById("bar").style.width =
        (current/questions.length)*100 + "%";

    let div=document.getElementById("answers");
    div.innerHTML="";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.innerHTML = opt.display;
        btn.onclick=()=>check(opt.value);
        div.appendChild(btn);
    });

    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");
}

// CHECK
function check(ans){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(ans===q.answer){
        correct++;
        fb.className="correct";
        fb.innerText="✅ Correct!";
        updateMastery(q.domain,true);
    } else {
        wrong++;
        fb.className="incorrect";
        fb.innerHTML=`❌ Incorrect<br>Answer: ${q.answer}<br>${q.rationale}`;
        updateMastery(q.domain,false);
    }

    document.getElementById("nextBtn").classList.remove("hidden");
}

// NEXT
function next(){
    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");

    current++;
    if(current<questions.length) show();
    else end();
}

// MASTER TRACK
function updateMastery(domain,isCorrect){
    if(!mastery[domain]) mastery[domain]={correct:0,total:0};
    mastery[domain].total++;
    if(isCorrect) mastery[domain].correct++;
    localStorage.setItem("praxis_mastery", JSON.stringify(mastery));
}

// END
function end(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("score").innerText =
        `Correct: ${correct} | Incorrect: ${wrong}`;

    renderMastery();
}

// RENDER MASTERY
function renderMastery(){
    let div=document.getElementById("mastery");
    div.innerHTML="";

    for(let d in mastery){
        let m=mastery[d];
        let p=Math.round((m.correct/m.total)*100);

        div.innerHTML+=`
        <p>${d}: ${p}%</p>
        <div class="bar-bg">
            <div class="bar-fill" style="width:${p}%"></div>
        </div>`;
    }
}

// SHUFFLE
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
