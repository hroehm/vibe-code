<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:12px;
    margin:8px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* FRACTIONS (Improved Alignment) */
.fraction {
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:0 8px;
}

.fraction .top {
    border-bottom:2px solid black;
    min-width:35px;
    text-align:center;
    font-size:22px;
}

.fraction .bottom {
    min-width:35px;
    text-align:center;
    font-size:22px;
}

/* RADICAL */
.radical {
    display:inline-flex;
    align-items:center;
    font-size:24px;
}
.radical .symbol {
    font-size:28px;
    margin-right:4px;
}
.radical .radicand {
    border-top:2px solid black;
    padding:3px 6px;
}

/* EXPONENT */
.exponent {
    position:relative;
    display:inline-block;
}
.exponent sup {
    position:absolute;
    top:-10px;
    right:-10px;
    font-size:16px;
}

/* Math layout */
.math {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    font-size:26px;
    margin:20px 0;
}

/* Answer buttons */
#answers button {
    display:flex;
    justify-content:center;
    align-items:center;
    width:240px;
    height:70px;
    margin:10px auto;
}

/* Progress bar */
.bar-bg { width:100%; background:#ddd; border-radius:8px; }
.bar-fill { height:15px; background:#0078d4; border-radius:8px; width:0%; }

.correct { color:green; }
.incorrect { color:red; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">

<select id="mode" onchange="toggleMode()">
<option value="core">Core Praxis</option>
<option value="specific">Specific Test</option>
</select><br><br>

<div id="categoryDiv">
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>
</div>

<div id="testDiv" class="hidden">
<input id="testNumber" placeholder="Enter Praxis Test #"><br><br>
</div>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select><br><br>

<input type="number" id="numQ" value="5"><br><br>

<button onclick="start()">Start</button>

</div>

<div class="card hidden" id="quiz">

<h3 id="progress"></h3>

<div class="bar-bg">
<div id="bar" class="bar-fill"></div>
</div>

<p id="domain"></p>
<div id="question"></div>
<div id="answers"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="next()">Next</button>

</div>

<div class="card hidden" id="results">
<h3 id="score"></h3>

<h3>Domain Mastery</h3>
<div id="mastery"></div>

<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

let questions=[], current=0, correct=0, wrong=0;
let mastery = JSON.parse(localStorage.getItem("praxis_mastery")) || {};

// UI toggle
function toggleMode(){
    let mode=document.getElementById("mode").value;
    document.getElementById("categoryDiv").classList.toggle("hidden", mode==="specific");
    document.getElementById("testDiv").classList.toggle("hidden", mode==="core");
}

// FRACTION
function frac(n,d){
    return `<span class="fraction">
        <span class="top">${n}</span>
        <span class="bottom">${d}</span>
    </span>`;
}

// RADICAL
function radical(n){
    return `<span class="radical">
        <span class="symbol">√</span>
        <span class="radicand">${n}</span>
    </span>`;
}

// EXPONENT
function exp(base,power){
    return `<span>${base}<sup>${power}</sup></span>`;
}

// MATH QUESTION TYPES
function mathQ(test,difficulty){

    if(difficulty==="easy"){
        let a=1+Math.random()*4|0;
        let b=2+Math.random()*6|0;

        return buildQ(test,"Fractions",
            `<div class="math">${frac(a,b)} + ${frac(1,b)}</div>`,
            `${a+1}/${b}`,
            [frac(a+1,b), frac(a,b), frac(a+2,b), frac(b,a)],
            "Add numerators with same denominator.");
    }

    if(difficulty==="medium"){
        let n=4+Math.random()*10|0;

        return buildQ(test,"Radicals",
            `<div class="math">${radical(n*n)}</div>`,
            `${n}`,
            [`${n}`, `${n+1}`, `${n-1}`, `${n+2}`],
            "Square root of n² is n.");
    }

    if(difficulty==="hard"){
        let base=2+Math.random()*5|0;

        return buildQ(test,"Exponents",
            `<div class="math">${exp(base,2)}</div>`,
            `${base*base}`,
            [`${base*base}`, `${base+base}`, `${base*3}`, `${base}`],
            "Exponent means repeated multiplication.");
    }
}

// BUILD QUESTION
function buildQ(test,domain,text,answer,options,rationale){
    return {
        domain,
        question:`Praxis ${test}: ${text}`,
        options: shuffle(options.map(o=>({display:o,value:o}))),
        answer:answer,
        rationale
    };
}

// READING
function readingQ(test){
    return buildQ(test,"Inference",
        `"Practice improves performance." What is implied?`,
        "Practice improves performance",
        [
            "Practice improves performance",
            "Practice is useless",
            "Students fail",
            "Learning ends"
        ],
        "Inference = logical conclusion."
    );
}

// WRITING
function writingQ(test){
    return buildQ(test,"Grammar",
        "Which sentence is correct?",
        "Each student has a book.",
        [
            "Each student has a book.",
            "Each students have books.",
            "Student have book.",
            "Students has books."
        ],
        "Singular subject → singular verb."
    );
}

// GENERATE
function generate(type,count,test,difficulty){
    let arr=[];
    for(let i=0;i<count;i++){
        if(type==="math") arr.push(mathQ(test,difficulty));
        else if(type==="reading") arr.push(readingQ(test));
        else arr.push(writingQ(test));
    }
    return arr;
}

// START
function start(){
    let mode=document.getElementById("mode").value;
    let difficulty=document.getElementById("difficulty").value;
    let count=parseInt(document.getElementById("numQ").value);

    let test,type;

    if(mode==="core"){
        test="Core";
        type=document.getElementById("category").value;
    } else {
        test=document.getElementById("testNumber").value.trim();
        if(!test){ alert("Enter test number"); return; }
        type="math";
    }

    current=0; correct=0; wrong=0;
    questions=generate(type,count,test,difficulty);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

// SHOW
function show(){
    let q=questions[current];

    document.getElementById("progress").innerText =
        `Question ${current+1}/${questions.length}`;
    document.getElementById("domain").innerText="Domain: "+q.domain;
    document.getElementById("question").innerHTML=q.question;

    document.getElementById("bar").style.width =
        (current/questions.length)*100+"%";

    let div=document.getElementById("answers");
    div.innerHTML="";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.innerHTML=opt.display;
        btn.onclick=()=>check(opt.value);
        div.appendChild(btn);
    });

    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");
}

// CHECK
function check(ans){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(ans===q.answer){
        correct++;
        fb.className="correct";
        fb.innerText="✅ Correct!";
        updateMastery(q.domain,true);
    } else {
        wrong++;
        fb.className="incorrect";
        fb.innerHTML=`❌ Incorrect<br>Answer: ${q.answer}<br>${q.rationale}`;
        updateMastery(q.domain,false);
    }

    document.getElementById("nextBtn").classList.remove("hidden");
}

// NEXT
function next(){
    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");

    current++;
    if(current<questions.length) show();
    else end();
}

// MASTER TRACK
function updateMastery(domain,isCorrect){
    if(!mastery[domain]) mastery[domain]={correct:0,total:0};
    mastery[domain].total++;
    if(isCorrect) mastery[domain].correct++;
    localStorage.setItem("praxis_mastery", JSON.stringify(mastery));
}

// END
function end(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("score").innerText =
        `Correct: ${correct} | Incorrect: ${wrong}`;

    renderMastery();
}

// RENDER
function renderMastery(){
    let div=document.getElementById("mastery");
    div.innerHTML="";

    for(let d in mastery){
        let m=mastery[d];
        let p=Math.round((m.correct/m.total)*100);

        div.innerHTML+=`
        <p>${d}: ${p}%</p>
        <div class="bar-bg">
        <div class="bar-fill" style="width:${p}%"></div>
        </div>`;
    }
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
