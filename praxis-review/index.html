<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:10px;
    margin:5px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover { background:#005a9e; }

.correct { color:green; font-weight:bold; }
.incorrect { color:red; font-weight:bold; }

.hidden { display:none; }

/* Fraction styling */
.fraction {
    display: inline-block;
    text-align: center;
    vertical-align: middle;
}
.fraction span {
    display: block;
    padding:2px;
}
.fraction .top {
    border-bottom:1px solid black;
}
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">

<h3>Start Practice</h3>

<label>Test Type:</label><br>
<select id="mode" onchange="toggleMode()">
<option value="core">Core Praxis</option>
<option value="specific">Specific Test</option>
</select><br><br>

<div id="testNumberDiv" class="hidden">
<label>Enter Praxis Test Number:</label><br>
<input type="text" id="testNumber"><br><br>
</div>

<label>Category (Core Only):</label><br>
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>

<label>Difficulty:</label><br>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select><br><br>

<label>Number of Questions:</label><br>
<input type="number" id="numQ" value="5" min="1" max="20"><br><br>

<button onclick="start()">Start</button>

</div>

<div class="card hidden" id="quiz">
<h3 id="progress"></h3>
<p id="domain"></p>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<button id="nextBtn" class="hidden" onclick="next()">Next</button>
</div>

<div class="card hidden" id="results">
<h3>Results</h3>
<p id="score"></p>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>
let questions=[], current=0, correct=0, wrong=0;

// Toggle mode UI
function toggleMode(){
    let mode=document.getElementById("mode").value;
    let testDiv=document.getElementById("testNumberDiv");
    let cat=document.getElementById("category");

    if(mode==="specific"){
        testDiv.classList.remove("hidden");
        cat.disabled=true;
    } else {
        testDiv.classList.add("hidden");
        cat.disabled=false;
    }
}

// Fraction display
function fracHTML(n,d){
    return `<span class="fraction">
        <span class="top">${n}</span>
        <span>${d}</span>
    </span>`;
}

// Math Question Generator
function mathQ(test, difficulty){

    if(difficulty==="easy"){
        let n=1+Math.floor(Math.random()*4);
        let d=2+Math.floor(Math.random()*6);
        let correctAns={n,d};

        let options=[
            correctAns,
            {n:n+1,d},
            {n,d:d+1},
            {n:d,d:n}
        ];

        return buildFractionQuestion(test,"Fractions",
            `Which represents this fraction? ${fracHTML(n,d)}`,
            correctAns, options,
            "Match numerator (top) and denominator (bottom)."
        );
    }

    if(difficulty==="medium"){
        let a=1+Math.floor(Math.random()*4);
        let b=2+Math.floor(Math.random()*5);
        let c=1+Math.floor(Math.random()*4);
        let d=2+Math.floor(Math.random()*5);

        let correctAns={n:a*d+b*c, d:b*d};

        let options=[
            correctAns,
            {n:a+c,d:b+d},
            {n:correctAns.n+1,d:correctAns.d},
            {n:correctAns.n,d:correctAns.d+1}
        ];

        return buildFractionQuestion(test,"Fraction Addition",
            `Compute ${fracHTML(a,b)} + ${fracHTML(c,d)}`,
            correctAns, options,
            "Find common denominator, then add numerators."
        );
    }
}

// Build fraction MC
function buildFractionQuestion(test, domain, text, correct, options, rationale){

    let formattedOptions = shuffle(options.map(o => ({
        display: fracHTML(o.n, o.d),
        value: `${o.n}/${o.d}`
    })));

    return {
        domain,
        question:`Praxis ${test}: ${text}`,
        options: formattedOptions,
        answer:`${correct.n}/${correct.d}`,
        rationale
    };
}

// Reading/Writing simplified
function readingQ(test){
    return {
        domain:"Main Idea",
        question:`Praxis ${test}: What is the main idea of "Practice improves performance"?`,
        options: shuffle([
            {display:"Practice improves performance",value:"Practice improves performance"},
            {display:"Practice wastes time",value:"Practice wastes time"},
            {display:"Learning is hard",value:"Learning is hard"},
            {display:"Performance is random",value:"Performance is random"}
        ]),
        answer:"Practice improves performance",
        rationale:"Main idea = central concept."
    };
}

function writingQ(test){
    return {
        domain:"Grammar",
        question:`Praxis ${test}: Which sentence is correct?`,
        options: shuffle([
            {display:"Each student must bring his or her book.",value:"Each student must bring his or her book."},
            {display:"Each student must bring their book.",value:"Each student must bring their book."},
            {display:"Each student bring book.",value:"Each student bring book."},
            {display:"Each student brings books.",value:"Each student brings books."}
        ]),
        answer:"Each student must bring his or her book.",
        rationale:"Singular subject → singular pronoun."
    };
}

// Generate
function generate(type,count,test,difficulty){
    let arr=[];

    for(let i=0;i<count;i++){
        if(type==="math") arr.push(mathQ(test,difficulty));
        else if(type==="reading") arr.push(readingQ(test));
        else arr.push(writingQ(test));
    }
    return arr;
}

// START
function start(){
    let mode=document.getElementById("mode").value;
    let test = mode==="core" ? "Core" :
        document.getElementById("testNumber").value || "Specific";

    let type=document.getElementById("category").value;
    if(mode==="specific") type="math"; // default for specific (can expand later)

    let difficulty=document.getElementById("difficulty").value;
    let count=parseInt(document.getElementById("numQ").value);

    questions=generate(type,count,test,difficulty);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

// SHOW
function show(){
    let q=questions[current];

    document.getElementById("progress").innerText=
        `Question ${current+1}/${questions.length}`;

    document.getElementById("domain").innerText=`Domain: ${q.domain}`;
    document.getElementById("question").innerHTML=q.question;

    let div=document.getElementById("answers");
    div.innerHTML="";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.innerHTML=opt.display;
        btn.onclick=()=>check(opt.value);
        div.appendChild(btn);
    });

    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");
}

// CHECK
function check(ans){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(ans===q.answer){
        correct++;
        fb.className="correct";
        fb.innerText="✅ Correct!";
    } else {
        wrong++;
        fb.className="incorrect";
        fb.innerHTML=`❌ Incorrect<br>Answer: ${q.answer}<br>${q.rationale}`;
    }

    document.getElementById("nextBtn").classList.remove("hidden");
}

// NEXT
function next(){
    current++;
    if(current<questions.length) show();
    else end();
}

// END
function end(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("score").innerText=
        `Correct: ${correct} | Incorrect: ${wrong}`;
}

// SHUFFLE
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
