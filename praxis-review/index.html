<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:10px;
    margin:5px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover { background:#005a9e; }

.correct { color:green; font-weight:bold; }
.incorrect { color:red; font-weight:bold; }

.hidden { display:none; }

.fraction {
    display:inline-block;
    text-align:center;
}
.fraction .top {
    border-bottom:1px solid black;
}

.progress-bar-bg {
    width:100%;
    background:#ddd;
    border-radius:8px;
    margin:10px 0;
}

.progress-bar {
    height:15px;
    background:#0078d4;
    border-radius:8px;
    width:0%;
}
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">

<label>Test Type:</label><br>
<select id="mode" onchange="toggleMode()">
<option value="core">Core Praxis</option>
<option value="specific">Specific Test</option>
</select><br><br>

<div id="categoryDiv">
<label>Category:</label><br>
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>
</div>

<div id="testNumberDiv" class="hidden">
<label>Praxis Test Number:</label><br>
<input type="text" id="testNumber"><br><br>
</div>

<label>Difficulty:</label><br>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select><br><br>

<label># Questions:</label><br>
<input type="number" id="numQ" value="5"><br><br>

<button onclick="start()">Start</button>

</div>

<div class="card hidden" id="quiz">

<h3 id="progress"></h3>

<div class="progress-bar-bg">
<div id="progressBar" class="progress-bar"></div>
</div>

<p id="domain"></p>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="next()">Next</button>

</div>

<div class="card hidden" id="results">
<h3>Results</h3>
<p id="score"></p>

<h3>Domain Mastery</h3>
<div id="mastery"></div>

<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

let questions=[], current=0, correct=0, wrong=0;
let mastery = JSON.parse(localStorage.getItem("mastery")) || {};

// UI toggle
function toggleMode(){
    let mode=document.getElementById("mode").value;
    document.getElementById("categoryDiv").classList.toggle("hidden", mode==="specific");
    document.getElementById("testNumberDiv").classList.toggle("hidden", mode==="core");
}

// Fractions
function frac(n,d){
    return `<span class="fraction"><span class="top">${n}</span>${d}</span>`;
}

// Math Q
function mathQ(test,difficulty){
    let a=1+Math.floor(Math.random()*4);
    let b=2+Math.floor(Math.random()*6);

    return {
        domain:"Fractions",
        question:`Praxis ${test}: ${frac(a,b)} + ${frac(1,2)} = ?`,
        options: buildFractionOptions(a+b, b),
        answer:`${a+b}/${b}`,
        rationale:"Add fractions with common denominator."
    };
}

function buildFractionOptions(n,d){
    let opts = [
        {n:n,d:d},
        {n:n+1,d:d},
        {n:n,d:d+1},
        {n:d,d:n}
    ];

    return shuffle(opts.map(o=>{
        return {
            display: frac(o.n,o.d),
            value: `${o.n}/${o.d}`
        };
    }));
}

// Reading
function readingQ(test){
    return {
        domain:"Inference",
        question:`Praxis ${test}: "Students who practice improve." What is implied?`,
        options: shuffle([
            {display:"Practice helps",value:"Practice helps"},
            {display:"Practice useless",value:"Practice useless"},
            {display:"Learning hard",value:"Learning hard"},
            {display:"Students quit",value:"Students quit"}
        ]),
        answer:"Practice helps",
        rationale:"Inference = logical conclusion."
    };
}

// Writing
function writingQ(test){
    return {
        domain:"Grammar",
        question:`Praxis ${test}: Which is correct?`,
        options: shuffle([
            {display:"Each student has a book.",value:"Each student has a book."},
            {display:"Each students has books.",value:"wrong"},
            {display:"Student has books.",value:"wrong2"},
            {display:"Each student have book.",value:"wrong3"}
        ]),
        answer:"Each student has a book.",
        rationale:"Singular subject → singular verb."
    };
}

// Generate
function generate(type,count,test,difficulty){
    let arr=[];
    for(let i=0;i<count;i++){
        if(type==="math") arr.push(mathQ(test,difficulty));
        else if(type==="reading") arr.push(readingQ(test));
        else arr.push(writingQ(test));
    }
    return arr;
}

// START
function start(){
    let mode=document.getElementById("mode").value;
    let difficulty=document.getElementById("difficulty").value;
    let count=parseInt(document.getElementById("numQ").value);

    let test, type;

    if(mode==="core"){
        test="Core";
        type=document.getElementById("category").value;
    } else {
        test=document.getElementById("testNumber").value;
        if(!test){ alert("Enter test number"); return; }
        type="math";
    }

    current=0;
    correct=0;
    wrong=0;

    questions=generate(type,count,test,difficulty);

    document.getElementById("progressBar").style.width="0%";

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

// SHOW
function show(){
    let q=questions[current];

    document.getElementById("progress").innerText =
        `Question ${current+1}/${questions.length}`;

    document.getElementById("domain").innerText = "Domain: "+q.domain;
    document.getElementById("question").innerHTML = q.question;

    let percent = (current/questions.length)*100;
    document.getElementById("progressBar").style.width = percent+"%";

    let div=document.getElementById("answers");
    div.innerHTML="";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.innerHTML=opt.display;
        btn.onclick=()=>check(opt.value);
        div.appendChild(btn);
    });
}

// CHECK
function check(ans){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(ans===q.answer){
        correct++;
        fb.className="correct";
        fb.innerText="✅ Correct!";
        updateMastery(q.domain,true);
    } else {
        wrong++;
        fb.className="incorrect";
        fb.innerHTML=`❌ Incorrect<br>Answer: ${q.answer}<br>${q.rationale}`;
        updateMastery(q.domain,false);
    }

    document.getElementById("nextBtn").classList.remove("hidden");
}

// MASTER TRACK
function updateMastery(domain,isCorrect){
    if(!mastery[domain]){
        mastery[domain]={correct:0,total:0};
    }
    mastery[domain].total++;
    if(isCorrect) mastery[domain].correct++;

    localStorage.setItem("mastery",JSON.stringify(mastery));
}

// NEXT
function next(){
    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");

    current++;
    if(current<questions.length) show();
    else end();
}

// END
function end(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("progressBar").style.width="100%";

    document.getElementById("score").innerText =
        `Correct: ${correct} | Incorrect: ${wrong}`;

    renderMastery();
}

// RENDER MASTERY
function renderMastery(){
    let div=document.getElementById("mastery");
    div.innerHTML="";

    for(let domain in mastery){
        let data=mastery[domain];
        let percent = Math.round((data.correct/data.total)*100);

        div.innerHTML += `
        <p>${domain}: ${percent}%</p>
        <div class="progress-bar-bg">
            <div class="progress-bar" style="width:${percent}%"></div>
        </div>
        `;
    }
}

// SHUFFLE
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
