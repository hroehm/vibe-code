<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praxis Review App</title>

<!-- ✅ MathJax -->
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; background:#f4f7fb; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:12px;
    margin:8px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#answers button {
    display:block;
    width:80%;
    margin:10px auto;
    font-size:20px;
}

.bar-bg { width:100%; background:#ddd; border-radius:8px; }
.bar-fill { height:15px; background:#0078d4; border-radius:8px; width:0%; }

.correct { color:green; }
.incorrect { color:red; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>Praxis Review App</h1>

<div class="card" id="setup">

<select id="mode" onchange="toggleMode()">
<option value="core">Core Praxis</option>
<option value="specific">Specific Test</option>
</select><br><br>

<div id="categoryDiv">
<select id="category">
<option value="math">Mathematics</option>
<option value="reading">Reading</option>
<option value="writing">Writing</option>
</select><br><br>
</div>

<div id="testDiv" class="hidden">
<input id="testNumber" placeholder="Enter Praxis Test #"><br><br>
</div>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select><br><br>

<input type="number" id="numQ" value="5"><br><br>

<button onclick="start()">Start</button>

</div>

<div class="card hidden" id="quiz">

<h3 id="progress"></h3>

<div class="bar-bg"><div id="bar" class="bar-fill"></div></div>

<p id="domain"></p>
<div id="question"></div>
<div id="answers"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="next()">Next</button>

</div>

<div class="card hidden" id="results">
<h3 id="score"></h3>

<h3>Domain Mastery</h3>
<div id="mastery"></div>

<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

let questions=[], current=0, correct=0, wrong=0;
let mastery = JSON.parse(localStorage.getItem("praxis_mastery")) || {};

function toggleMode(){
    let mode=document.getElementById("mode").value;
    document.getElementById("categoryDiv").classList.toggle("hidden", mode==="specific");
    document.getElementById("testDiv").classList.toggle("hidden", mode==="core");
}

// ✅ Math Builders (MathJax syntax)
function frac(a,b){ return `\\(\\frac{${a}}{${b}}\\)`; }
function radical(n){ return `\\(\\sqrt{${n}}\\)`; }
function exp(b,e){ return `\\(${b}^{${e}}\\)`; }

// ✅ Praxis-aware Math Generator
function mathQ(test,difficulty){

    if(difficulty==="easy"){
        let a=1+Math.random()*4|0;
        let b=2+Math.random()*5|0;

        return buildQ(test,"Fractions",
            `${frac(a,b)} + ${frac(1,b)}`,
            frac(a+1,b),
            [frac(a+1,b), frac(a,b), frac(a+2,b), frac(b,a)],
            "Add numerators when denominators are equal."
        );
    }

    if(difficulty==="medium"){
        let n=4+Math.random()*10|0;

        return buildQ(test,"Radicals",
            `${radical(n*n)}`,
            `\\(${n}\\)`,
            [`\\(${n}\\)`, `\\(${n+1}\\)`, `\\(${n-1}\\)`, `\\(${n+2}\\)`],
            "Square root of a perfect square equals its root."
        );
    }

    if(difficulty==="hard"){
        let b=2+Math.random()*5|0;

        return buildQ(test,"Exponents",
            `${exp(b,2)}`,
            `\\(${b*b}\\)`,
            [`\\(${b*b}\\)`, `\\(${b+b}\\)`, `\\(${b*3}\\)`, `\\(${b}\\)`],
            "Exponent represents repeated multiplication."
        );
    }
}

// Reading
function readingQ(test){
    return buildQ(test,"Inference",
        "A teacher who differentiates instruction improves outcomes. What is implied?",
        "Differentiation improves student outcomes",
        [
            "Differentiation improves student outcomes",
            "Teaching is easy",
            "Students do not learn",
            "Instruction does not matter"
        ],
        "Inference requires drawing a conclusion based on evidence."
    );
}

// Writing
function writingQ(test){
    return buildQ(test,"Grammar",
        "Which sentence is grammatically correct?",
        "Each student has a book.",
        [
            "Each student has a book.",
            "Each students have books.",
            "Student have books.",
            "Students has books."
        ],
        "Singular subjects require singular verbs."
    );
}

function buildQ(test,domain,question,answer,options,rationale){
    return {
        domain,
        question:`Praxis ${test}: ${question}`,
        options: shuffle(options.map(o=>({display:o,value:o}))),
        answer,
        rationale
    };
}

function generate(type,count,test,difficulty){
    let arr=[];
    for(let i=0;i<count;i++){
        if(type==="math") arr.push(mathQ(test,difficulty));
        else if(type==="reading") arr.push(readingQ(test));
        else arr.push(writingQ(test));
    }
    return arr;
}

function start(){
    let mode=document.getElementById("mode").value;
    let difficulty=document.getElementById("difficulty").value;
    let count=parseInt(document.getElementById("numQ").value);

    let test,type;

    if(mode==="core"){
        test="Core";
        type=document.getElementById("category").value;
    } else {
        test=document.getElementById("testNumber").value.trim();
        if(!test){ alert("Enter test number"); return; }
        type="math";
    }

    current=0; correct=0; wrong=0;
    questions=generate(type,count,test,difficulty);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

function show(){
    let q=questions[current];

    document.getElementById("progress").innerText =
        `Question ${current+1}/${questions.length}`;

    document.getElementById("domain").innerText="Domain: "+q.domain;
    document.getElementById("question").innerHTML=q.question;

    document.getElementById("bar").style.width =
        (current/questions.length)*100+"%";

    let div=document.getElementById("answers");
    div.innerHTML="";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.innerHTML=opt.display;
        btn.onclick=()=>check(opt.value);
        div.appendChild(btn);
    });

    MathJax.typeset(); // ✅ render math
}

function check(ans){
    let q=questions[current];
    let fb=document.getElementById("feedback");

    if(ans===q.answer){
        correct++;
        fb.className="correct";
        fb.innerText="✅ Correct!";
        updateMastery(q.domain,true);
    } else {
        wrong++;
        fb.className="incorrect";
        fb.innerHTML=`❌ Incorrect<br>Answer: ${q.answer}<br>${q.rationale}`;
        MathJax.typeset();
        updateMastery(q.domain,false);
    }

    document.getElementById("nextBtn").classList.remove("hidden");
}

function next(){
    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").classList.add("hidden");
    current++;
    if(current<questions.length) show();
    else end();
}

function updateMastery(domain,isCorrect){
    if(!mastery[domain]) mastery[domain]={correct:0,total:0};
    mastery[domain].total++;
    if(isCorrect) mastery[domain].correct++;
    localStorage.setItem("praxis_mastery", JSON.stringify(mastery));
}

function end(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    document.getElementById("score").innerText =
        `Correct: ${correct} | Incorrect: ${wrong}`;

    renderMastery();
}

function renderMastery(){
    let div=document.getElementById("mastery");
    div.innerHTML="";

    for(let d in mastery){
        let m=mastery[d];
        let p=Math.round((m.correct/m.total)*100);

        div.innerHTML+=`
        <p>${d}: ${p}%</p>
        <div class="bar-bg">
            <div class="bar-fill" style="width:${p}%"></div>
        </div>`;
    }
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
